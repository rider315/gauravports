<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Basic SEO (JS will update these after fetching the post) -->
  <title>Blog Post</title>
  <meta name="description" id="metaDescription" content="" />
  <link rel="canonical" id="canonicalLink" href="" />

  <!-- Open Graph -->
  <meta property="og:type" content="article" />
  <meta property="og:title" id="ogTitle" content="" />
  <meta property="og:description" id="ogDescription" content="" />
  <meta property="og:image" id="ogImage" content="" />
  <meta property="og:url" id="ogUrl" content="" />

  <!-- Structured data -->
  <script type="application/ld+json" id="jsonLd"></script>

  <!-- Your main styles -->
  <link rel="stylesheet" href="./assets/css/style.css" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <!-- Contentful SDK (must be before config + blog scripts) -->
  <script src="https://cdn.jsdelivr.net/npm/contentful@latest/dist/contentful.browser.min.js"></script>
</head>

<body>

  <!-- navbar starts -->
  <header>
    <a href="index.html#home" class="logo"><i class="fab fa-node-js"></i> Gaurav</a>

    <div id="menu" class="fas fa-bars"></div>

    <nav class="navbar">
      <ul>
        <li><a href="index.html#home">Home</a></li>
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#skills">Skills</a></li>
        <li><a href="index.html#education">Education</a></li>
        <li><a href="projects/index.html">Work</a></li>
        <li><a href="experience/index.html">Experience</a></li>
        <li><a class="active" href="blog.html">Blog</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
    </nav>
  </header>
  <!-- navbar ends -->

  <main class="blog" style="min-height: 80vh; padding-top: 8rem;">
    <h2 class="heading">Blog <span>Post</span></h2>

    <div id="blogPostContainer" class="blog-post-full" style="margin-top: 2.5rem;">
      <p class="blog-loading"><i class="fas fa-spinner fa-spin"></i> Loading...</p>
    </div>
  </main>

  <!-- Contentful config (LOAD FIRST) -->
  <script src="./assets/js/contentful-config.js"></script>

  <!-- Blog post script (LOAD AFTER config) -->
  <script src="./assets/js/blog-post.js"></script>

  <!-- Navbar toggle for this page (keeps it independent from assets/js/script.js) -->
  <script>
    const menu = document.getElementById('menu');
    const navbar = document.querySelector('.navbar');

    if (menu && navbar) {
      menu.addEventListener('click', () => {
        menu.classList.toggle('fa-times');
        navbar.classList.toggle('nav-toggle');
      });

      window.addEventListener('scroll', () => {
        menu.classList.remove('fa-times');
        navbar.classList.remove('nav-toggle');
      });
    }
  </script>

</body>
</html>
